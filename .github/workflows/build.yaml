name: Build and Push

on:
  push:
    branches: [main]
    paths: [app/**]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push
      uses: docker/build-push-action@v5
      with:
        context: ./app
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/web:latest
          ghcr.io/${{ github.repository }}/web:${{ github.sha }}

    - name: Update deployment tag
      run: |
        sed -i "s|image:.*|image: ghcr.io/${{ github.repository }}/web:${{ github.sha }}|" deployment.yaml
        git config user.email "ci@lab"
        git config user.name "CI Bot"
        git add deployment.yaml
        git commit -m "ci: update image to ${{ github.sha }}"
        git push
